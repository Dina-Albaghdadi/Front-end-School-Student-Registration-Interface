<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emp</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
<div class="container">
    <!-- HEADER SECTION -->
    <div class="header">
        <img src="Interface\Left-logo.png" class="logo-left">
        <h1>CUBED SMS</h1>
        <img src="Interface\Right-logo.png" class="logo-right">
    </div>
    
    <div class="content">
        <!-- LEFT SIDE: REGISTRATION FORM -->
        <div class="form-section">
            <form>
                <label>ID NO: <span class="star">*</span></label>
                <input type="text" required>
                
                <!-- SCHOOL GRADES FROM 1 to 12 -->
                <label>Grade: <span class="star">*</span></label>
                <select required>
                    <option></option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                </select>
                
                <label>LRN: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>DOE: <span class="star">*</span></label>
                <input type="date" required>
                
                <label>Last Name: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>First Name: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Middle Name: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Contact No: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Address1: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Sex: <span class="star">*</span></label>
                <select required>
                    <option>Male</option>
                    <option>Female</option>
                </select>
                
                <label>Age: <span class="star">*</span></label>
                <input type="number" required>
                
                <label>Date of Birth: <span class="star">*</span></label>
                <input type="date" required>
                
                <label>Birth Place: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Father's Name: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Occupation1:</label>
                <input type="text">
                
                <label>Employer's Name1:</label>
                <input type="text">
                
                <label>Address2: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Mother's Name: <span class="star">*</span></label>
                <input type="text" required>
                
                <label>Occupation2:</label>
                <input type="text">
                
                <label>Employer's Name2:</label>
                <input type="text">
                
                <label>Address3: <span class="star">*</span></label>
                <input type="text" required>
            </form>
        </div>

        <!-- RIGHT SIDE: PICTURE AND BUTTONS -->
        <div class="right-section">
            <div class="picture-box">
                <p>Picture</p>
                <img src="Interface\Group-photo.png" alt="Group-photo">
                <button type="button">Browse</button>
            </div>
            <div class="buttons">
                <button type="button">Add</button>
                <button type="button">Save</button>
                <button type="button">Delete</button>
                <button type="button">Database</button>
                <button type="button">Log Out</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
